<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocuFácil - Generador de Documentos</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <!-- PDF-lib para editar y estampar el PDF -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <!-- PDF.js para visualizar el PDF en pantalla -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <!-- Download.js para descargar el archivo -->
    <script src="https://unpkg.com/downloadjs@1.4.7"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; justify-content: center; min-height: 100vh; }
        
        .app-container { background: #1e1e1e; width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5 ); }
        
        .header { background: #2c3e50; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #34495e; }
        .header h1 { color: #fff; font-size: 20px; display: flex; align-items: center; gap: 8px; }
        .creditos-badge { background: #f1c40f; color: #000; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; }

        .screen { padding: 20px; display: none; flex-direction: column; gap: 20px; flex: 1; overflow-y: auto; padding-bottom: 40px; }
        .screen.active { display: flex; }

        /* --- SECCIÓN YAPE Y COMPRA --- */
        .compra-section { background: linear-gradient(135deg, #742384 0%, #4a1554 100%); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #8e44ad; }
        .yape-logo { height: 40px; margin-bottom: 10px; object-fit: contain; }
        .compra-info { color: #fff; font-size: 14px; margin-bottom: 15px; line-height: 1.5; }
        .precio-tag { background: #00E4C0; color: #000; font-weight: bold; padding: 3px 8px; border-radius: 5px; font-size: 15px; }
        .btn-whatsapp { background: #25D366; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; text-decoration: none; }

        /* --- SECCIÓN ACTIVAR CÓDIGO --- */
        .activar-section { background: #222; border-radius: 12px; padding: 15px; border: 1px solid #333; }
        .activar-section h3 { color: #ccc; font-size: 15px; margin-bottom: 10px; }
        .input-codigo-wrapper { display: flex; gap: 10px; }
        .input-codigo { flex: 1; padding: 12px; background: #000; color: #f1c40f; border: 2px solid #444; border-radius: 8px; outline: none; font-size: 16px; text-align: center; font-weight: bold; text-transform: uppercase; }
        .btn-activar { background: #f1c40f; color: #000; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer; }

        /* --- TARJETAS DE DOCUMENTOS --- */
        .section-title { color: #fff; font-size: 18px; margin-top: 10px; border-bottom: 2px solid #333; padding-bottom: 8px; }
        .lista-plantillas { display: flex; flex-direction: column; gap: 12px; }
        
        .card { background: #2a2a2a; border: 1px solid #444; border-radius: 10px; padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 15px; position: relative; overflow: hidden; transition: 0.2s; }
        .card-icon { font-size: 30px; }
        .card-info { flex: 1; }
        .card-info h3 { color: #fff; font-size: 16px; margin-bottom: 4px; }
        .card-info p { color: #aaa; font-size: 12px; line-height: 1.3; }

        /* --- MODALES --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #555; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .modal-content h3 { color: #f1c40f; text-align: center; margin-bottom: 5px; }

        /* Pantalla de Chat sobrepuesta para celular */
        #screen-ai-chat {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #121212;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }
        #screen-ai-chat.active { display: flex; }

        .chat-header {
            background: #2c3e50;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid #34495e;
        }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .chat-message { max-width: 85%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.4; }
        .chat-message.user { background: #3498db; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-message.ai { background: #2a2a2a; border: 1px solid #444; align-self: flex-start; border-bottom-left-radius: 2px; }
        
        .chat-input-area { padding: 15px; background: #1e1e1e; display: flex; gap: 10px; border-top: 1px solid #333; }
        .chat-input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 12px 15px; border-radius: 25px; outline: none; }
        .btn-chat-action { background: #3498db; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; justify-content: center; align-items: center; }

        /* MODAL DE PREVISUALIZACIÓN MEJORADO */
        #modal-preview-ai {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .preview-modal-content {
            background: #222;
            border-radius: 10px;
            border: 1px solid #555;
            width: 100%;
            max-width: 450px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-header {
            background: #2c3e50;
            padding: 15px;
            border-bottom: 2px solid #34495e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-header h3 { color: #f1c40f; margin: 0; }

        .preview-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-document {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #1a1a1a;
        }

        .preview-document textarea {
            width: 100%;
            height: 100%;
            background: white;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 5px;
            outline: none;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            resize: none;
            min-height: 250px;
        }

        .preview-chat-section {
            height: 200px;
            display: flex;
            flex-direction: column;
            border-top: 1px solid #333;
            background: #1e1e1e;
        }

        .preview-chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .preview-chat-message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 13px;
        }

        .preview-chat-message.user { background: #3498db; align-self: flex-end; border-bottom-right-radius: 2px; }
        .preview-chat-message.ai { background: #444; border: 1px solid #555; align-self: flex-start; border-bottom-left-radius: 2px; }

        .preview-chat-input {
            padding: 10px;
            display: flex;
            gap: 8px;
            background: #1e1e1e;
            border-top: 1px solid #333;
        }

        .preview-chat-input input {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 12px;
            border-radius: 20px;
            outline: none;
        }

        .preview-chat-input button {
            background: #3498db;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
        }

        .preview-actions {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: #222;
            border-top: 1px solid #333;
        }

        .preview-actions button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            flex: 1;
        }

        .btn-firmar { background: #e67e22; color: white; }
        .btn-descargar { background: #2ecc71; color: #000; }
        .btn-cerrar-preview { background: #555; color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>📄 DocuFácil</h1>
        <div class="creditos-badge">🪙 <span id="user-creditos">0</span></div>
    </div>

    <!-- PANTALLA 1: INICIO -->
    <div id="screen-home" class="screen active">
        <div class="compra-section">
            <img src="https://vectorseek.com/wp-content/uploads/2023/09/Yape-App-Logo-Vector.svg-.png" alt="Yape" class="yape-logo">
            <div class="compra-info">
                <p style="font-size: 16px; font-weight: bold;">¿Necesitas crear un documento?</p>
                <p>1 Crédito = 1 Hoja = <span class="precio-tag">S/ 0.20</span></p>
                <p style="margin-top: 10px; font-weight: bold; color: #f1c40f; font-size: 18px;">Yapea al: 967 188 120</p>
            </div>
            <a href="https://wa.me/51967188120" target="_blank" class="btn-whatsapp">💬 Enviar captura por WhatsApp</a>
        </div>

        <div class="activar-section">
            <h3>🔑 Activar código:</h3>
            <div class="input-codigo-wrapper">
                <input type="text" id="input-codigo" class="input-codigo" placeholder="EJ: MANU-123">
                <button class="btn-activar" onclick="activarCodigoBoton( )">Activar</button>
            </div>
        </div>

        <h2 class="section-title">📚 Documentos</h2>
        <div id="lista-plantillas" class="lista-plantillas">
            <!-- Se llena con JS -->
        </div>
    </div>
</div>

<!-- PANTALLA CHAT AI -->
<div id="screen-ai-chat" class="screen">
    <div class="chat-header">
        <button onclick="cerrarChatAI()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;">⬅</button>
        <span style="font-weight:bold;">✨ DocuFácil AI Expert</span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" class="chat-input" placeholder="Escribe o usa el micro..." oninput="actualizarBotonChat()">
        <button id="btn-chat-action" class="btn-chat-action" onclick="accionChat()">🎤</button>
    </div>
</div>

<!-- MODAL DE PREVISUALIZACIÓN MEJORADO -->
<div id="modal-preview-ai">
    <div class="preview-modal-content">
        <div class="preview-header">
            <h3>✨ Previsualización</h3>
            <button onclick="cerrarPreviewAI()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
        </div>
        <div class="preview-body">
            <div class="preview-document">
                <textarea id="preview-textarea"></textarea>
            </div>
            <div class="preview-chat-section">
                <div class="preview-chat-messages" id="preview-chat-messages"></div>
                <div class="preview-chat-input">
                    <input type="text" id="preview-chat-input" placeholder="Refinar..." oninput="actualizarBotonPreviewChat()">
                    <button id="btn-preview-chat-action" onclick="accionPreviewChat()">🎤</button>
                </div>
            </div>
        </div>
        <div class="preview-actions">
            <button class="btn-firmar" onclick="abrirModalFirma()">✍️ Firmar</button>
            <button class="btn-descargar" onclick="generarPdfAI()">✅ Descargar (1 Crédito)</button>
        </div>
    </div>
</div>

<!-- MODAL DE FIRMA -->
<div id="modal-firma" class="modal-overlay">
    <div class="modal-content">
        <h3>Dibuja tu firma</h3>
        <canvas id="canvas-firma" width="300" height="150" style="background:white; border-radius:5px; cursor:crosshair; touch-action:none; width:100%;"></canvas>
        <div class="modal-actions">
            <button onclick="limpiarFirma()" style="background:#e74c3c; color:white; border:none; padding:10px; border-radius:5px;">Limpiar</button>
            <button onclick="guardarFirma()" style="background:#2ecc71; color:black; border:none; padding:10px; border-radius:5px;">Aceptar</button>
            <button onclick="cerrarModalFirma()" style="background:#555; color:white; border:none; padding:10px; border-radius:5px;">Cerrar</button>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://wpzddhmllctdsiuxenss.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwemRkaG1sbGN0ZHNpdXhlbnNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjUyNzQsImV4cCI6MjA5OTU0MTI3NH0.hwSxJ3Sk_RlgbvFyr8S64XRuxW7j55BU4gaIneFTuhY';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

    let usuarioActual = { creditos: 0 };
    let chatHistory = [];
    let previewChatHistory = [];
    let currentDocumentDraft = null;
    let firmaParaPreview = null;
    let isAITyping = false;
    let voiceTimer;

    document.addEventListener('DOMContentLoaded', () => {
        cargarPlantillas();
        const codigo = localStorage.getItem('docufacil_codigo');
        if (codigo) activarCodigo(codigo, true);
    });

    function cargarPlantillas() {
        const container = document.getElementById('lista-plantillas');
        container.innerHTML = `
            <div class="card" onclick="mostrarScreenAIChat()">
                <div class="card-icon">✨</div>
                <div class="card-info">
                    <h3>Generación de Documento</h3>
                    <p>Usa IA para crear documentos profesionales</p>
                </div>
            </div>
            <div class="card" onclick="alert('Próximamente')">
                <div class="card-icon">✍️</div>
                <div class="card-info">
                    <h3>Rellenar mi propio PDF</h3>
                    <p>Sube tu PDF y rellénalo a mano</p>
                </div>
            </div>
        `;
    }

    function mostrarScreenAIChat() {
        document.getElementById('screen-ai-chat').classList.add('active');
        addMessage('ai', '👋 ¡Hola! ¿Qué documento necesitas hoy?');
    }

    function cerrarChatAI() { document.getElementById('screen-ai-chat').classList.remove('active'); }

    function addMessage(sender, text) {
        const container = document.getElementById('chat-messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'chat-message ' + sender;
        msgDiv.innerHTML = text.replace(/\n/g, '  
');
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    function actualizarBotonChat() {
        const input = document.getElementById('chat-input');
        const btn = document.getElementById('btn-chat-action');
        btn.innerText = input.value.trim() === "" ? "🎤" : "➤";
        btn.style.background = input.value.trim() === "" ? "#3498db" : "#2ecc71";
    }

    async function enviarMensajeAI() {
        const input = document.getElementById('chat-input');
        const texto = input.value.trim();
        if (!texto || isAITyping) return;

        addMessage('user', texto);
        input.value = "";
        actualizarBotonChat();
        isAITyping = true;
        chatHistory.push({ role: 'user', content: texto });

        try {
            const { data, error } = await supabase.functions.invoke('generar-documento', {
                body: JSON.stringify({ history: chatHistory, user_input: texto, current_draft: currentDocumentDraft }),
            });
            if (error) throw error;

            const aiResponse = data.response;
            addMessage('ai', aiResponse.message);
            chatHistory.push({ role: 'assistant', content: aiResponse.raw_response });

            if (aiResponse.document_content) {
                currentDocumentDraft = aiResponse.document_content;
                mostrarModalPreviewAI(currentDocumentDraft);
            }
        } catch (e) {
            addMessage('ai', '❌ Error: ' + e.message);
        } finally { isAITyping = false; }
    }

    function accionChat() {
        const input = document.getElementById('chat-input');
        if (input.value.trim() === "") iniciarVoz('chat-input', enviarMensajeAI);
        else enviarMensajeAI();
    }

    function mostrarModalPreviewAI(content) {
        document.getElementById('modal-preview-ai').style.display = 'flex';
        document.getElementById('preview-textarea').value = content;
        addPreviewMessage('ai', '💬 ¿Deseas hacer algún cambio?');
    }

    function cerrarPreviewAI() { document.getElementById('modal-preview-ai').style.display = 'none'; }

    function addPreviewMessage(sender, text) {
        const container = document.getElementById('preview-chat-messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'preview-chat-message ' + sender;
        msgDiv.innerHTML = text.replace(/\n/g, '  
');
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }

    async function enviarMensajePreviewChat() {
        const input = document.getElementById('preview-chat-input');
        const texto = input.value.trim();
        if (!texto) return;

        addPreviewMessage('user', texto);
        input.value = "";
        previewChatHistory.push({ role: 'user', content: texto });

        try {
            const { data, error } = await supabase.functions.invoke('generar-documento', {
                body: JSON.stringify({ history: previewChatHistory, user_input: texto, current_draft: document.getElementById('preview-textarea').value }),
            });
            if (error) throw error;
            const aiResponse = data.response;
            addPreviewMessage('ai', aiResponse.message);
            if (aiResponse.document_content) document.getElementById('preview-textarea').value = aiResponse.document_content;
        } catch (e) { addPreviewMessage('ai', '❌ Error'); }
    }

    function actualizarBotonPreviewChat() {
        const input = document.getElementById('preview-chat-input');
        const btn = document.getElementById('btn-preview-chat-action');
        btn.innerText = input.value.trim() === "" ? "🎤" : "➤";
    }

    function accionPreviewChat() {
        const input = document.getElementById('preview-chat-input');
        if (input.value.trim() === "") iniciarVoz('preview-chat-input', enviarMensajePreviewChat);
        else enviarMensajePreviewChat();
    }

    function iniciarVoz(inputId, callback) {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.start();
        recognition.onresult = (e) => {
            document.getElementById(inputId).value = e.results[0][0].transcript;
            setTimeout(callback, 1500);
        };
    }

    async function generarPdfAI() {
        const content = document.getElementById('preview-textarea').value;
        if (usuarioActual.creditos < 1) return alert("Sin créditos");

        try {
            const pdfDoc = await PDFLib.PDFDocument.create();
            let page = pdfDoc.addPage();
            const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
            page.drawText(content, { x: 50, y: 750, size: 12, font: font, maxWidth: 500 });

            if (firmaParaPreview) {
                const img = await pdfDoc.embedPng(firmaParaPreview);
                page.drawImage(img, { x: 50, y: 100, width: 100, height: 50 });
            }

            const pdfBytes = await pdfDoc.save();
            download(pdfBytes, "Documento.pdf", "application/pdf");
            usuarioActual.creditos--;
            document.getElementById('user-creditos').innerText = usuarioActual.creditos;
            cerrarPreviewAI();
        } catch (e) { alert("Error al generar PDF"); }
    }

    // Funciones de Firma
    let canvas, ctx, drawing = false;
    function abrirModalFirma() {
        document.getElementById('modal-firma').style.display = 'flex';
        canvas = document.getElementById('canvas-firma');
        ctx = canvas.getContext('2d');
        canvas.onmousedown = (e) => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); };
        canvas.onmousemove = (e) => { if(drawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } };
        canvas.onmouseup = () => drawing = false;
        // Touch support
        canvas.ontouchstart = (e) => { drawing = true; const t = e.touches[0]; const r = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(t.clientX - r.left, t.clientY - r.top); };
        canvas.ontouchmove = (e) => { if(drawing) { e.preventDefault(); const t = e.touches[0]; const r = canvas.getBoundingClientRect(); ctx.lineTo(t.clientX - r.left, t.clientY - r.top); ctx.stroke(); } };
        canvas.ontouchend = () => drawing = false;
    }
    function limpiarFirma() { ctx.clearRect(0,0,300,150); }
    function guardarFirma() { firmaParaPreview = canvas.toDataURL(); cerrarModalFirma(); alert("Firma guardada"); }
    function cerrarModalFirma() { document.getElementById('modal-firma').style.display = 'none'; }

    function activarCodigoBoton() { activarCodigo(document.getElementById('input-codigo').value, false); }
    function activarCodigo(c, auto) {
        usuarioActual.creditos = 10;
        document.getElementById('user-creditos').innerText = 10;
        localStorage.setItem('docufacil_codigo', c);
        if(!auto) alert("Activado");
    }
</script>
</body>
</html>
