    // === EDITOR AVANZADO ===
    async function cargarEnEditorAvanzado(textContent) {
        advancedPdfDoc = await PDFLib.PDFDocument.create();
        advancedPdfDoc.addPage(PDFLib.PageSizes.A4);
        
        const container = document.getElementById('advanced-canvas-container');
        container.innerHTML = '';
        container.style.display = 'flex';
        document.getElementById('btn-float-add-advanced').style.display = 'block';

        const wrapper = document.createElement('div');
        wrapper.className = 'pdf-page-wrapper';
        wrapper.dataset.pageNum = 1;

        const canvas = document.createElement('canvas');
        canvas.width = 794; canvas.height = 1123;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white'; ctx.fillRect(0,0,794,1123);
        wrapper.appendChild(canvas);
        container.appendChild(wrapper);

        crearElementoFlotanteAdvanced(wrapper, 60, 80, 1, 'text', textContent);
    }

    function crearElementoFlotanteAdvanced(parent, x, y, pageNum, tipo, contenido) {
        const wrapper = document.createElement('div');
        wrapper.className = 'floating-element';
        wrapper.style.left = x + 'px';
        wrapper.style.top = y + 'px';

        let elData = { wrapper, type: tipo, pageNum, texto: contenido };

        if (tipo === 'text') {
            const el = document.createElement('span');
            el.className = 'floating-text';
            el.innerText = contenido;
            wrapper.appendChild(el);
        } else if (tipo === 'image') {
            const img = document.createElement('img');
            img.src = contenido;
            img.style.maxWidth = '280px';
            wrapper.appendChild(img);
        }

        const btnDelete = document.createElement('div');
        btnDelete.innerHTML = '×'; btnDelete.className = 'btn-delete-float';
        btnDelete.onclick = () => wrapper.remove();
        wrapper.appendChild(btnDelete);
        parent.appendChild(wrapper);
        advancedElementosFlotantes.push(elData);
    }

    function toggleMenuMasAdvanced() {
        const menu = document.getElementById('menu-flotante-advanced');
        menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    function abrirModalImagenAdvanced() {
        const url = prompt("Pega la URL de la imagen:");
        if (url) {
            const wrapper = document.querySelector('.pdf-page-wrapper');
            crearElementoFlotanteAdvanced(wrapper, 100, 300, 1, 'image', url);
        }
    }

    async function reorganizarConIA() {
        const texto = advancedElementosFlotantes.map(e => e.texto).join('\n');
        if (!texto) return;
        chatHistory.push({ role: 'user', content: `Reorganiza el documento manteniendo todos los datos: ${texto}` });
        enviarMensajeAI();
    }
        async function enviarMensajeAI() {
        const input = document.getElementById('chat-input');
        const texto = input.value.trim();
        if (!texto) return;
        
        addMessage('user', texto);
        chatHistory.push({ role: 'user', content: texto });
        input.value = '';

        try {
            const { data } = await supabase.functions.invoke('generar-documento', {
                body: JSON.stringify({ history: chatHistory, user_input: texto })
            });

            const resp = data.response;
            addMessage('ai', resp.message);
            
            if (resp.document_content) {
                currentDocumentDraft = resp.document_content;
                cargarEnEditorAvanzado(resp.document_content);
            }
        } catch(e) {
            addMessage('ai', 'Error: ' + e.message);
        }
    }

    function addMessage(sender, text) {
        const container = document.getElementById('chat-messages');
        const div = document.createElement('div');
        div.className = `chat-message ${sender}`;
        div.innerHTML = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    async function generarPdfAvanzado() {
        if (!advancedPdfDoc) return alert("No hay documento");
        try {
            const pdfBytes = await advancedPdfDoc.save();
            download(pdfBytes, "Documento_Final.pdf", "application/pdf");
            alert("✅ Descargado!");
            volverAHome();
        } catch(e) { alert(e.message); }
    }

    function volverAHome() {
