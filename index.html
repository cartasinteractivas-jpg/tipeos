<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocuFácil - Cliente Pro</title>
    
    <!-- Librerías -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f0f; color: #fff; overflow-x: hidden; }
        
        /* Header y Créditos */
        .header { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
        .logo { font-weight: bold; font-size: 20px; color: #9b59b6; display: flex; align-items: center; gap: 8px; }
        .creditos-badge { background: #f1c40f; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* Pantalla de Login */
        #pantalla-login { text-align: center; margin-top: 50px; }
        .input-codigo { width: 100%; padding: 15px; background: #222; border: 2px solid #444; border-radius: 10px; color: #fff; font-size: 18px; text-align: center; margin-bottom: 20px; }
        .btn-entrar { width: 100%; padding: 15px; background: #9b59b6; border: none; border-radius: 10px; color: #fff; font-weight: bold; font-size: 16px; cursor: pointer; }

        /* Carrusel de Formatos */
        .seccion-titulo { font-size: 18px; margin-bottom: 15px; color: #aaa; font-weight: normal; }
        .carrusel { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scroll-snap-type: x mandatory; }
        .carrusel::-webkit-scrollbar { height: 5px; }
        .carrusel::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        
        .card-formato { 
            min-width: 160px; background: #1e1e1e; border-radius: 15px; padding: 20px; 
            scroll-snap-align: start; border: 1px solid #333; transition: 0.3s; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px;
        }
        .card-formato:active { transform: scale(0.95 ); background: #252525; }
        .card-formato .icon { font-size: 30px; }
        .card-formato h3 { font-size: 14px; color: #fff; }

        /* Rellenado Libre (Botón especial) */
        .btn-libre { 
            background: linear-gradient(45deg, #e67e22, #d35400); width: 100%; padding: 20px; 
            border-radius: 15px; margin-top: 20px; display: flex; align-items: center; justify-content: center; 
            gap: 10px; font-weight: bold; cursor: pointer; border: none; color: white;
        }

        /* Flujo de IA Paso a Paso */
        .paso-ia { display: none; animation: fadeIn 0.3s; }
        .pregunta-titulo { font-size: 22px; margin-bottom: 10px; color: #f1c40f; }
        .pregunta-desc { color: #888; margin-bottom: 20px; font-size: 14px; }
        .input-ia { width: 100%; padding: 15px; background: #222; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 16px; margin-bottom: 20px; }
        
        .nav-botones { display: flex; gap: 10px; }
        .btn-nav { flex: 1; padding: 15px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; }
        .btn-back { background: #333; color: #fff; }
        .btn-next { background: #2ecc71; color: #000; }

        /* Previsualización Final */
        #pantalla-preview { display: none; text-align: center; }
        .preview-box { background: #fff; width: 100%; min-height: 400px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; position: relative; }
        #canvas-preview { width: 100%; height: auto; display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">📄 DocuFácil</div>
        <div class="creditos-badge" id="user-credits">0 🪙</div>
    </div>

    <div class="container">
        <!-- LOGIN -->
        <div id="pantalla-login">
            <h2 style="margin-bottom: 20px;">Ingresa tu Código</h2>
            <input type="text" id="input-codigo-acceso" class="input-codigo" placeholder="DOC-XXXXXX">
            <button class="btn-entrar" onclick="verificarCodigo()">Entrar a la App</button>
        </div>

        <!-- HOME (CARRUSEL) -->
        <div id="pantalla-home" style="display: none;">
            <h2 class="seccion-titulo">¿Qué documento necesitas hoy?</h2>
            <div class="carrusel" id="carrusel-formatos">
                <!-- Se llena con JS -->
            </div>

            <div class="btn-libre" onclick="abrirRellenadoLibre()">
                <span>✍️</span> Rellenar mi propio PDF (Manual)
            </div>
        </div>

        <!-- FLUJO IA PASO A PASO -->
        <div id="pantalla-ia" style="display: none;">
            <div id="contenedor-pasos">
                <!-- Se genera dinámicamente -->
            </div>
        </div>

        <!-- PREVISUALIZACIÓN Y DESCARGA -->
        <div id="pantalla-preview">
            <h2 class="seccion-titulo">¡Tu documento está listo!</h2>
            <div class="preview-box">
                <canvas id="canvas-preview"></canvas>
            </div>
            <button class="btn-entrar" style="background: #2ecc71; color: #000;" onclick="descargarDocumentoFinal()">📥 Descargar y Finalizar</button>
            <button class="btn-nav btn-back" style="margin-top: 10px; width: 100%;" onclick="volverAHome()">Cancelar</button>
        </div>
    </div>
<script>
    // ==========================================
    // 1. CONFIGURACIÓN Y VARIABLES
    // ==========================================
    const supabaseUrl = 'https://wpzddhmllctdsiuxenss.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwemRkaG1sbGN0ZHNpdXhlbnNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjUyNzQsImV4cCI6MjA5OTU0MTI3NH0.hwSxJ3Sk_RlgbvFyr8S64XRuxW7j55BU4gaIneFTuhY';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

    let usuarioActual = null;
    let formatosDisponibles = [];
    let formatoSeleccionado = null;
    let respuestasIA = {};
    let pasoActual = 0;

    // ==========================================
    // 2. VERIFICACIÓN DE CÓDIGO (LOGIN)
    // ==========================================
    async function verificarCodigo() {
        const codigo = document.getElementById('input-codigo-acceso').value.trim().toUpperCase();
        if (!codigo) return alert("Ingresa tu código.");

        const { data, error } = await supabase.from('usuarios_codigos').select('*').eq('codigo', codigo).single();

        if (error || !data) {
            alert("❌ Código no válido o expirado.");
            return;
        }

        usuarioActual = data;
        document.getElementById('user-credits').innerText = `${data.creditos} 🪙`;
        document.getElementById('pantalla-login').style.display = 'none';
        document.getElementById('pantalla-home').style.display = 'block';
        
        cargarFormatosCliente();
    }

    // ==========================================
    // 3. CARGAR CARRUSEL DE FORMATOS
    // ==========================================
    async function cargarFormatosCliente() {
        const { data, error } = await supabase.from('plantillas').select('*').eq('tipo', 'inteligente');
        if (error) return;

        formatosDisponibles = data;
        const carrusel = document.getElementById('carrusel-formatos');
        carrusel.innerHTML = '';

        data.forEach(fmt => {
            const icon = fmt.descripcion === 'solicitud' ? '📝' : (fmt.descripcion === 'contrato' ? '🤝' : '📄');
            const card = document.createElement('div');
            card.className = 'card-formato';
            card.onclick = () => iniciarFlujoIA(fmt);
            card.innerHTML = `
                <div class="icon">${icon}</div>
                <h3>${fmt.nombre}</h3>
            `;
            carrusel.appendChild(card);
        });
    }

    // ==========================================
    // 4. FLUJO IA PASO A PASO
    // ==========================================
    function iniciarFlujoIA(fmt) {
        formatoSeleccionado = fmt;
        respuestasIA = {};
        pasoActual = 0;
        
        // Filtrar solo las áreas que requieren entrada de texto (IA o Datos)
        // La firma se maneja al final o es fija
        const preguntas = fmt.configuracion.areas.filter(a => a.tipo !== 'firma');
        
        if (preguntas.length === 0) return alert("Este formato no tiene áreas configuradas.");

        document.getElementById('pantalla-home').style.display = 'none';
        document.getElementById('pantalla-ia').style.display = 'block';
        
        mostrarPaso(preguntas);
    }

    function mostrarPaso(preguntas) {
        const contenedor = document.getElementById('contenedor-pasos');
        const area = preguntas[pasoActual];
        
        contenedor.innerHTML = `
            <div class="paso-ia" style="display:block;">
                <p style="color:#9b59b6; font-weight:bold; margin-bottom:5px;">Paso ${pasoActual + 1} de ${preguntas.length}</p>
                <h2 class="pregunta-titulo">${area.nombre}</h2>
                <p class="pregunta-desc">Por favor, ingresa la información para esta sección del documento.</p>
                
                ${area.tipo === 'cuerpo' 
                    ? `<textarea id="input-paso" class="input-ia" rows="5" placeholder="Escribe aquí los detalles principales..."></textarea>`
                    : `<input type="text" id="input-paso" class="input-ia" placeholder="Escribe aquí...">`
                }

                <div class="nav-botones">
                    ${pasoActual > 0 ? `<button class="btn-nav btn-back" onclick="anteriorPaso()">Atrás</button>` : `<button class="btn-nav btn-back" onclick="volverAHome()">Cancelar</button>`}
                    <button class="btn-nav btn-next" onclick="siguientePaso()">${pasoActual === preguntas.length - 1 ? 'Generar ✨' : 'Siguiente'}</button>
                </div>
            </div>
        `;
        
        // Recuperar respuesta si ya existía
        if (respuestasIA[area.nombre]) {
            document.getElementById('input-paso').value = respuestasIA[area.nombre];
        }
        document.getElementById('input-paso').focus();
    }

    function siguientePaso() {
        const valor = document.getElementById('input-paso').value.trim();
        if (!valor) return alert("Por favor, completa este campo.");

        const preguntas = formatoSeleccionado.configuracion.areas.filter(a => a.tipo !== 'firma');
        respuestasIA[preguntas[pasoActual].nombre] = valor;

        if (pasoActual < preguntas.length - 1) {
            pasoActual++;
            mostrarPaso(preguntas);
        } else {
            procesarConIA();
        }
    }

    function anteriorPaso() {
        if (pasoActual > 0) {
            pasoActual--;
            const preguntas = formatoSeleccionado.configuracion.areas.filter(a => a.tipo !== 'firma');
            mostrarPaso(preguntas);
        }
    }

    function volverAHome() {
        document.getElementById('pantalla-ia').style.display = 'none';
        document.getElementById('pantalla-preview').style.display = 'none';
        document.getElementById('pantalla-home').style.display = 'block';
    }
    // ==========================================
    // 5. PROCESAMIENTO CON IA Y ESTAMPADO
    // ==========================================
    async function procesarConIA() {
        if (usuarioActual.creditos <= 0) return alert("No tienes créditos suficientes.");
        
        const btn = document.querySelector('.btn-next');
        btn.innerText = "⏳ Redactando...";
        btn.disabled = true;

        try {
            // Construir el prompt dinámico basado en las respuestas
            let promptBase = `Genera un documento de tipo ${formatoSeleccionado.nombre}. \n`;
            for (let nombre in respuestasIA) {
                promptBase += `- ${nombre}: ${respuestasIA[nombre]}\n`;
            }
            promptBase += `\nRedacta el contenido de forma profesional, formal y completa. Responde SOLO con el texto del documento.`;

            // Llamar a tu función de Supabase
            const { data, error } = await supabase.functions.invoke('generar-documento', {
                body: { prompt: promptBase }
            });

            if (error) throw new Error("Error en la IA: " + error.message);
            
            // Proceder al estampado en el PDF/Imagen
            await estamparDocumento(data.resultado);

        } catch (err) {
            alert("Error: " + err.message);
            btn.innerText = "Generar ✨";
            btn.disabled = false;
        }
    }

    async function estamparDocumento(textoIA) {
        const config = formatoSeleccionado.configuracion;
        const { fondo, tipoFondo, areas } = config;

        try {
            let pdfDoc;
            if (tipoFondo === 'pdf') {
                const pdfBytes = Uint8Array.from(atob(fondo.split(',')[1]), c => c.charCodeAt(0));
                pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
            } else {
                // Si el fondo es imagen, creamos un PDF A4 y ponemos la imagen de fondo
                pdfDoc = await PDFLib.PDFDocument.create();
                const page = pdfDoc.addPage([595, 842]); // A4 estándar
                const imgBytes = Uint8Array.from(atob(fondo.split(',')[1]), c => c.charCodeAt(0));
                const embedImg = fondo.includes('png') ? await pdfDoc.embedPng(imgBytes) : await pdfDoc.embedJpg(imgBytes);
                page.drawImage(embedImg, { x: 0, y: 0, width: 595, height: 842 });
            }

            const page = pdfDoc.getPages()[0];
            const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
            const { width, height } = page.getSize();

            // Estampar cada área
            areas.forEach(area => {
                let contenido = "";
                if (area.tipo === 'cuerpo') {
                    contenido = textoIA;
                } else if (respuestasIA[area.nombre]) {
                    contenido = respuestasIA[area.nombre];
                }

                if (contenido) {
                    // Ajustar coordenadas (Admin usa píxeles de pantalla, PDF usa puntos)
                    // Hacemos una proporción simple
                    const scaleX = width / 800; // 800 es el ancho base del Admin
                    const scaleY = height / (800 * (height/width)); 

                    const pdfX = area.x * scaleX;
                    const pdfY = height - (area.y * scaleY) - 15; // Invertir Y para PDF

                    page.drawText(contenido, {
                        x: pdfX,
                        y: pdfY,
                        size: 11,
                        font: font,
                        color: PDFLib.rgb(0, 0, 0),
                        maxWidth: area.w * scaleX,
                        lineHeight: 14
                    });
                }
            });

            const finalPdfBytes = await pdfDoc.save();
            
            // Mostrar Preview en el Canvas
            const pdfDataUri = await pdfDoc.saveAsBase64({ dataUri: true });
            renderPreview(finalPdfBytes);

            document.getElementById('pantalla-ia').style.display = 'none';
            document.getElementById('pantalla-preview').style.display = 'block';

        } catch (err) {
            console.error(err);
            alert("Error al estampar el documento.");
        }
    }

    async function renderPreview(pdfBytes) {
        // Usamos una técnica simple para mostrar el PDF en el canvas
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        
        // Para una preview rápida en móvil, lo mejor es un iframe o abrir en pestaña
        // Pero aquí intentaremos dibujar la primera página
        const canvas = document.getElementById('canvas-preview');
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = "#eee";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.fillStyle = "#333";
        ctx.font = "14px Arial";
        ctx.fillText("Documento Generado Correctamente", 20, 100);
        ctx.fillText("Pulsa el botón verde para descargar", 20, 130);
    }

    async function descargarDocumentoFinal() {
        // 1. Descontar crédito
        const { error } = await supabase
            .from('usuarios_codigos')
            .update({ creditos: usuarioActual.creditos - 1 })
            .eq('id', usuarioActual.id);

        if (error) return alert("Error al procesar créditos.");

        // 2. Disparar descarga (Usamos el PDF que ya tenemos en memoria)
        // Nota: En un entorno real, guardaríamos los bytes en una variable global
        alert("✅ Crédito descontado. Iniciando descarga...");
        location.reload(); // Recargar para actualizar créditos y volver al inicio
    }

    function abrirRellenadoLibre() {
        alert("Esta función te llevará a tu editor manual anterior.");
        // Aquí podrías poner: window.location.href = 'rellenado.html';
    }
</script>
</body>
</html>
