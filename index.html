    function getViewportCenter() {
        const container = document.getElementById('free-canvas-container');
        const scrollTop = container.scrollTop;
        const scrollLeft = container.scrollLeft;
        const centerY = scrollTop + (container.clientHeight / 2);
        const centerX = scrollLeft + (container.clientWidth / 2);
        const wrappers = document.querySelectorAll('.pdf-page-wrapper');
        let targetWrapper = wrappers[0];
        wrappers.forEach(w => {
            const wrapperTop = w.offsetTop;
            const wrapperBottom = wrapperTop + w.offsetHeight;
            if (centerY >= wrapperTop && centerY <= wrapperBottom) targetWrapper = w;
        });
        const relativeY = (centerY - targetWrapper.offsetTop);
        const relativeX = (centerX - targetWrapper.offsetLeft);
        return { wrapper: targetWrapper, x: relativeX, y: relativeY, pageNum: parseInt(targetWrapper.dataset.pageNum) };
    }

    function crearElementoFlotante(parent, x, y, pageNum, tipo, contenido, formato = null, customSize = null) {
        const wrapper = document.createElement('div');
        wrapper.className = 'floating-element';
        const visualScale = window.pdfGlobalScale || 1;
        const baseSize = customSize || (tipo === 'text' ? 14 : 120);
        const initialSize = baseSize / visualScale;

        wrapper.style.left = `${x - (initialSize / 2)}px`;
        wrapper.style.top = `${y - (initialSize / 2)}px`;
        wrapper.style.transform = `scale(${visualScale})`;
        wrapper.style.transformOrigin = 'top left';

        let elData = { wrapper, type: tipo, pageNum, hasBg: false, size: baseSize };

        let domElement;
        if (tipo === 'text') {
            domElement = document.createElement('span');
            domElement.className = 'floating-text';
            domElement.innerText = contenido;
            domElement.style.fontSize = `${baseSize}px`;
            elData.texto = contenido;
        } else if (tipo === 'image') {
            domElement = document.createElement('img');
            domElement.src = contenido;
            domElement.style.width = `${baseSize}px`;
            elData.dataUrl = contenido;
        }

        const btnDelete = document.createElement('div');
        btnDelete.innerHTML = '×'; btnDelete.className = 'btn-delete-float';
        btnDelete.onclick = (e) => { e.stopPropagation(); wrapper.remove(); elementosFlotantes = elementosFlotantes.filter(i => i !== elData); };

        const btnBg = document.createElement('div');
        btnBg.innerHTML = '⬜'; btnBg.className = 'btn-bg-float';
        btnBg.onclick = (e) => { 
            e.stopPropagation(); 
            elData.hasBg = !elData.hasBg; 
            domElement.style.background = elData.hasBg ? 'white' : 'transparent';
            domElement.style.padding = elData.hasBg ? '4px' : '0';
        };

        const resizeHandle = document.createElement('div');
        resizeHandle.className = 'resize-handle';

        wrapper.appendChild(domElement);
        wrapper.appendChild(btnDelete);
        wrapper.appendChild(btnBg);
        wrapper.appendChild(resizeHandle);
        parent.appendChild(wrapper);

        const seleccionar = (e) => {
            e.stopPropagation();
            document.querySelectorAll('.floating-element').forEach(el => el.classList.remove('selected'));
            wrapper.classList.add('selected');
        };
        wrapper.addEventListener('mousedown', seleccionar);
        wrapper.addEventListener('touchstart', seleccionar);
        hacerInteractivo(wrapper, elData, resizeHandle, visualScale);
        elementosFlotantes.push(elData);
    }

    function hacerInteractivo(wrapper, elData, resizeHandle, currentScale) {
        // ... (mantengo tu lógica de dragging y resizing, solo ajusto escala)
        // Versión simplificada y corregida para zoom:
        let isDragging = false, isResizing = false;
        let startX, startY, initialLeft, initialTop, initialSize;

        wrapper.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('btn-delete-float') || e.target.classList.contains('btn-bg-float')) return;
            const clientX = e.clientX;
            const clientY = e.clientY;
            if (e.target === resizeHandle) {
                isResizing = true;
                initialSize = elData.size;
                startX = clientX;
            } else {
                isDragging = true;
                startX = clientX; startY = clientY;
                initialLeft = wrapper.offsetLeft;
                initialTop = wrapper.offsetTop;
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                wrapper.style.left = (initialLeft + (e.clientX - startX) / currentScale) + 'px';
                wrapper.style.top = (initialTop + (e.clientY - startY) / currentScale) + 'px';
            } else if (isResizing) {
                const dx = (e.clientX - startX) / currentScale;
                const newSize = Math.max(8, initialSize + dx);
                if (elData.type === 'text') {
                    wrapper.querySelector('.floating-text').style.fontSize = newSize + 'px';
                } else {
                    wrapper.querySelector('img').style.width = newSize + 'px';
                }
                elData.size = newSize;
            }
        });

        document.addEventListener('mouseup', () => { isDragging = false; isResizing = false; });
    }
        async function generarPdfLibre() {
        if (!freePdfDoc) return;
        if (usuarioActual.creditos < freePdfPageCount) {
            alert(`⚠️ Necesitas ${freePdfPageCount} créditos.`);
            return;
        }
        const btn = document.getElementById('btn-generar-free');
        btn.innerText = "⏳ Procesando..."; btn.disabled = true;
        try {
            const pages = freePdfDoc.getPages();
            for (const el of elementosFlotantes) {
                const page = pages[el.pageNum - 1];
                const { width, height } = page.getSize();
                const ratio = width / el.wrapper.parentElement.offsetWidth;
                const pdfX = el.wrapper.offsetLeft * ratio;
                const pdfY = height - (el.wrapper.offsetTop * ratio) - (el.wrapper.offsetHeight * ratio);

                if (el.hasBg && el.type === 'text') {
                    page.drawRectangle({ 
                        x: pdfX - 2, y: pdfY - 5, 
                        width: (el.wrapper.offsetWidth * ratio) + 4, 
                        height: (el.wrapper.offsetHeight * ratio) + 8, 
                        color: PDFLib.rgb(1,1,1) 
                    });
                }

                if (el.type === 'text') {
                    page.drawText(el.texto, { x: pdfX, y: pdfY, size: el.size * ratio, color: PDFLib.rgb(0,0,0) });
                } else if (el.type === 'image') {
                    const img = await freePdfDoc.embedPng(el.dataUrl);
                    page.drawImage(img, { x: pdfX, y: pdfY, width: el.size * ratio, height: el.wrapper.offsetHeight * ratio });
                }
            }
            await descontarCredito(freePdfPageCount);
            const pdfBytes = await freePdfDoc.save();
            download(pdfBytes, "Documento_Final.pdf", "application/pdf");
            alert("✅ ¡Documento descargado!");
            volverAHome();
        } catch (err) { alert("Error: " + err.message); }
        finally { 
            btn.innerText = `✨ Descargar PDF Lleno (${freePdfPageCount} Créditos)`; 
            btn.disabled = false; 
        }
    }
