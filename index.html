<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocuFácil - Cliente</title>
    
    <!-- Librerías -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        /* MANTENEMOS TU DISEÑO ORIGINAL */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f0f; color: #fff; }
        
        .header { background: #1a1a1a; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo { font-weight: bold; font-size: 20px; color: #9b59b6; }
        .creditos-badge { background: #f1c40f; color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* Login */
        .input-codigo { width: 100%; padding: 15px; background: #222; border: 2px solid #444; border-radius: 10px; color: #fff; font-size: 18px; text-align: center; margin-bottom: 20px; }
        .btn-entrar { width: 100%; padding: 15px; background: #9b59b6; border: none; border-radius: 10px; color: #fff; font-weight: bold; cursor: pointer; }

        /* NUEVO: Carrusel de Formatos Inteligentes */
        .seccion-titulo { font-size: 16px; margin: 20px 0 10px; color: #aaa; }
        .carrusel { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scroll-snap-type: x mandatory; }
        .carrusel::-webkit-scrollbar { display: none; }
        
        .card-formato { 
            min-width: 140px; background: #1e1e1e; border-radius: 15px; padding: 15px; 
            border: 1px solid #333; text-align: center; cursor: pointer;
        }
        .card-formato .icon { font-size: 24px; margin-bottom: 8px; }
        .card-formato h3 { font-size: 13px; color: #fff; }

        /* Botón Rellenado Libre (Tu estilo original ) */
        .btn-libre { 
            background: #222; border: 2px dashed #444; width: 100%; padding: 20px; 
            border-radius: 15px; margin-top: 10px; display: flex; align-items: center; justify-content: center; 
            gap: 10px; font-weight: bold; cursor: pointer; color: #888;
        }

        /* Modales y Flujo IA */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #1e1e1e; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        
        .input-ia { width: 100%; padding: 12px; background: #000; border: 1px solid #444; border-radius: 8px; color: #fff; margin-bottom: 15px; }
        .btn-nav { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; }
        
        /* Canvas de Rellenado Libre (Tu motor original) */
        #free-canvas-container { width: 100%; margin-top: 20px; }
        .pdf-page-wrapper { position: relative; margin-bottom: 20px; background: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .floating-element { position: absolute; cursor: move; user-select: none; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">📄 DocuFácil</div>
        <div class="creditos-badge" id="user-credits">0 🪙</div>
    </div>

    <div class="container">
        <!-- PANTALLA LOGIN -->
        <div id="pantalla-login">
            <h2 style="text-align: center; margin-bottom: 20px;">Ingresa tu Código</h2>
            <input type="text" id="input-codigo-acceso" class="input-codigo" placeholder="DOC-XXXXXX">
            <button class="btn-entrar" onclick="verificarCodigo()">Entrar a la App</button>
        </div>

        <!-- PANTALLA HOME -->
        <div id="pantalla-home" style="display: none;">
            <h2 class="seccion-titulo">Formatos Inteligentes (IA)</h2>
            <div class="carrusel" id="carrusel-formatos">
                <!-- Se llena con JS -->
            </div>

            <h2 class="seccion-titulo">Otras opciones</h2>
            <div class="btn-libre" onclick="activarModoLibre()">
                <span>📂</span> Rellenar mi propio PDF (Manual)
            </div>
            
            <input type="file" id="free-pdf-upload" accept="application/pdf" style="display: none;">
        </div>

        <!-- MOTOR DE RELLENADO LIBRE (TU DISEÑO ORIGINAL) -->
        <div id="pantalla-libre" style="display: none;">
            <button class="btn-entrar" style="background: #333; margin-bottom: 15px;" onclick="volverAHome()">⬅ Volver al Inicio</button>
            <div id="free-canvas-container"></div>
            <button class="btn-entrar" id="btn-generar-free" style="background: #2ecc71; margin-top: 20px;" onclick="generarPdfLibre()">✨ Descargar PDF Final</button>
        </div>
    </div>

    <!-- MODAL IA PASO A PASO -->
    <div id="modal-ia" class="modal-overlay">
        <div class="modal-content" id="contenedor-ia">
            <!-- Se genera dinámicamente -->
        </div>
    </div>
<script>
    // ==========================================
    // 1. CONFIGURACIÓN Y VARIABLES
    // ==========================================
    const supabaseUrl = 'https://wpzddhmllctdsiuxenss.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwemRkaG1sbGN0ZHNpdXhlbnNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NjUyNzQsImV4cCI6MjA5OTU0MTI3NH0.hwSxJ3Sk_RlgbvFyr8S64XRuxW7j55BU4gaIneFTuhY';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey );

    let usuarioActual = null;
    let formatoSeleccionado = null;
    let respuestasIA = {};
    let pasoActual = 0;

    // Configurar PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // ==========================================
    // 2. ACTIVACIÓN DE CÓDIGO (TU LÓGICA ORIGINAL )
    // ==========================================
    async function activarCodigo() {
        const codigo = document.getElementById('input-codigo').value.trim().toUpperCase();
        if (!codigo) return alert("Ingresa un código.");

        const { data, error } = await supabase.from('usuarios_codigos').select('*').eq('codigo', codigo).single();

        if (error || !data) {
            alert("❌ Código no válido o ya usado.");
            return;
        }

        usuarioActual = data;
        localStorage.setItem('docufacil_token', codigo); // Persistencia
        document.getElementById('user-creditos').innerText = data.creditos;
        
        // Cargar formatos inteligentes
        cargarFormatosInteligentes();
    }

    // Auto-login si ya tiene código guardado
    async function autoLogin() {
        const token = localStorage.getItem('docufacil_token');
        if (token) {
            document.getElementById('input-codigo').value = token;
            activarCodigo();
        }
    }
    autoLogin();

    // ==========================================
    // 3. CARGAR CARRUSEL (IA)
    // ==========================================
    async function cargarFormatosInteligentes() {
        const { data, error } = await supabase.from('plantillas').select('*').eq('tipo', 'inteligente');
        if (error) return;

        const carrusel = document.getElementById('carrusel-formatos');
        carrusel.innerHTML = '';

        data.forEach(fmt => {
            const icon = fmt.descripcion === 'solicitud' ? '📝' : (fmt.descripcion === 'contrato' ? '🤝' : '📄');
            const card = document.createElement('div');
            card.className = 'card-formato';
            card.onclick = () => abrirFlujoIA(fmt);
            card.innerHTML = `
                <div class="icon">${icon}</div>
                <h3>${fmt.nombre}</h3>
            `;
            carrusel.appendChild(card);
        });
    }

    // ==========================================
    // 4. FLUJO IA PASO A PASO (MODAL)
    // ==========================================
    function abrirFlujoIA(fmt) {
        if (!usuarioActual || usuarioActual.creditos <= 0) {
            return alert("🔒 Necesitas activar un código con créditos.");
        }
        
        formatoSeleccionado = fmt;
        respuestasIA = {};
        pasoActual = 0;
        
        const preguntas = fmt.configuracion.areas.filter(a => a.tipo !== 'firma');
        if (preguntas.length === 0) return alert("Este formato no tiene preguntas configuradas.");

        document.getElementById('modal-ia').style.display = 'flex';
        mostrarPasoIA(preguntas);
    }

    function mostrarPasoIA(preguntas) {
        const contenedor = document.getElementById('contenedor-ia');
        const area = preguntas[pasoActual];
        
        contenedor.innerHTML = `
            <p style="color:#9b59b6; font-size:12px; font-weight:bold;">PASO ${pasoActual + 1} DE ${preguntas.length}</p>
            <h3 style="color:#f1c40f; margin-bottom:5px;">${area.nombre}</h3>
            <p style="color:#888; font-size:13px; margin-bottom:15px;">Ingresa la información para esta sección.</p>
            
            ${area.tipo === 'cuerpo' 
                ? `<textarea id="input-ia-paso" class="input-ia" rows="5" placeholder="Escribe aquí..."></textarea>`
                : `<input type="text" id="input-ia-paso" class="input-ia" placeholder="Escribe aquí...">`
            }

            <div style="display:flex; gap:10px;">
                ${pasoActual > 0 
                    ? `<button class="btn-nav" style="background:#444; color:#fff;" onclick="anteriorPasoIA()">Atrás</button>` 
                    : `<button class="btn-nav" style="background:#444; color:#fff;" onclick="cerrarModalIA()">Cancelar</button>`
                }
                <button class="btn-nav" style="background:#2ecc71; color:#000;" onclick="siguientePasoIA()">
                    ${pasoActual === preguntas.length - 1 ? 'Generar ✨' : 'Siguiente'}
                </button>
            </div>
        `;
        
        if (respuestasIA[area.nombre]) {
            document.getElementById('input-ia-paso').value = respuestasIA[area.nombre];
        }
        document.getElementById('input-ia-paso').focus();
    }

    function siguientePasoIA() {
        const valor = document.getElementById('input-ia-paso').value.trim();
        if (!valor) return alert("Por favor, completa este campo.");

        const preguntas = formatoSeleccionado.configuracion.areas.filter(a => a.tipo !== 'firma');
        respuestasIA[preguntas[pasoActual].nombre] = valor;

        if (pasoActual < preguntas.length - 1) {
            pasoActual++;
            mostrarPasoIA(preguntas);
        } else {
            procesarDocumentoIA();
        }
    }

    function anteriorPasoIA() {
        if (pasoActual > 0) {
            pasoActual--;
            const preguntas = formatoSeleccionado.configuracion.areas.filter(a => a.tipo !== 'firma');
            mostrarPasoIA(preguntas);
        }
    }

    function cerrarModalIA() {
        document.getElementById('modal-ia').style.display = 'none';
    }

    function volverAHome() {
        document.getElementById('screen-libre').classList.remove('active');
        document.getElementById('screen-home').classList.add('active');
    }
    // ==========================================
    // 5. PROCESAMIENTO IA Y ESTAMPADO
    // ==========================================
    async function procesarDocumentoIA() {
        const btn = document.querySelector('#contenedor-ia .btn-nav:last-child');
        btn.innerText = "⏳ Redactando...";
        btn.disabled = true;

        try {
            // Construir prompt
            let promptBase = `Genera un documento de tipo ${formatoSeleccionado.nombre}. \n`;
            for (let nombre in respuestasIA) {
                promptBase += `- ${nombre}: ${respuestasIA[nombre]}\n`;
            }
            promptBase += `\nRedacta el contenido de forma profesional y formal. Responde SOLO con el texto del documento.`;

            const { data, error } = await supabase.functions.invoke('generar-documento', {
                body: { prompt: promptBase }
            });

            if (error) throw new Error("Error en la IA: " + error.message);
            
            await estamparDocumento(data.resultado);

        } catch (err) {
            alert("Error: " + err.message);
            btn.innerText = "Generar ✨";
            btn.disabled = false;
        }
    }

    async function estamparDocumento(textoIA) {
        const { fondo, tipoFondo, areas } = formatoSeleccionado.configuracion;

        try {
            let pdfDoc;
            if (tipoFondo === 'pdf') {
                const pdfBytes = Uint8Array.from(atob(fondo.split(',')[1]), c => c.charCodeAt(0));
                pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
            } else {
                pdfDoc = await PDFLib.PDFDocument.create();
                const page = pdfDoc.addPage([595, 842]);
                const imgBytes = Uint8Array.from(atob(fondo.split(',')[1]), c => c.charCodeAt(0));
                const embedImg = fondo.includes('png') ? await pdfDoc.embedPng(imgBytes) : await pdfDoc.embedJpg(imgBytes);
                page.drawImage(embedImg, { x: 0, y: 0, width: 595, height: 842 });
            }

            const page = pdfDoc.getPages()[0];
            const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
            const { width, height } = page.getSize();

            areas.forEach(area => {
                let contenido = area.tipo === 'cuerpo' ? textoIA : (respuestasIA[area.nombre] || "");
                if (contenido) {
                    const scaleX = width / 800;
                    const scaleY = height / (800 * (height/width));
                    const pdfX = area.x * scaleX;
                    const pdfY = height - (area.y * scaleY) - 12;

                    page.drawText(contenido, {
                        x: pdfX, y: pdfY, size: 10, font: font,
                        color: PDFLib.rgb(0, 0, 0),
                        maxWidth: area.w * scaleX, lineHeight: 12
                    });
                }
            });

            const finalPdfBytes = await pdfDoc.save();
            download(finalPdfBytes, `${formatoSeleccionado.nombre}.pdf`, "application/pdf");
            
            // Descontar crédito
            await supabase.from('usuarios_codigos').update({ creditos: usuarioActual.creditos - 1 }).eq('id', usuarioActual.id);
            
            alert("✅ ¡Documento generado y descargado!");
            location.reload();

        } catch (err) {
            alert("Error al estampar: " + err.message);
        }
    }

    // ==========================================
    // 6. MOTOR DE RELLENADO LIBRE (TU LÓGICA ORIGINAL)
    // ==========================================
    let freePdfDoc = null;
    let freePdfPageCount = 0;
    let elementosFlotantes = [];

    document.getElementById('pdf-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async function() {
            const typedarray = new Uint8Array(this.result);
            freePdfDoc = await PDFLib.PDFDocument.load(typedarray);
            freePdfPageCount = freePdfDoc.getPageCount();
            
            document.getElementById('screen-home').classList.remove('active');
            document.getElementById('screen-libre').classList.add('active');
            
            renderizarPdfLibre(typedarray);
        };
        reader.readAsArrayBuffer(file);
    });

    async function renderizarPdfLibre(data) {
        const container = document.getElementById('free-canvas-container');
        container.innerHTML = '';
        const pdf = await pdfjsLib.getDocument(data).promise;

        for (let i = 1; i <= freePdfPageCount; i++) {
            const page = await pdf.getPage(i);
            const viewport = page.getViewport({ scale: 1.5 });
            
            const wrapper = document.createElement('div');
            wrapper.className = 'pdf-page-wrapper';
            wrapper.style.width = viewport.width + 'px';
            wrapper.style.height = viewport.height + 'px';
            
            const canvas = document.createElement('canvas');
            canvas.className = 'free-pdf-canvas';
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            
            wrapper.appendChild(canvas);
            container.appendChild(wrapper);
            
            await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            
            // Evento para añadir elementos
            wrapper.onclick = (e) => {
                if (e.target !== canvas) return;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                abrirMenuOpciones(wrapper, x, y, i);
            };
        }
    }

    // --- AQUÍ VAN TUS FUNCIONES DE MODALES (TEXTO, FIRMA, SÍMBOLOS) ---
    // (Debes mantener las funciones que ya tenías: abrirMenuOpciones, guardarTextoModal, etc.)
    
    function abrirMenuOpciones(parent, x, y, page) {
        // Tu lógica de modal de opciones que ya funcionaba...
        alert("Toca para añadir texto o firma (Usa tus funciones originales aquí)");
    }

    async function generarPdfLibre() {
        // Tu lógica de descarga de PDF manual que ya funcionaba...
        alert("Generando PDF manual...");
    }
</script>
</body>
</html>
