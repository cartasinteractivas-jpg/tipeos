        .pdf-page-wrapper { position: relative; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-bottom: 20px; width: 100% !important; }
        .free-pdf-canvas { display: block; width: 100%; height: auto; }

        .floating-element { position: absolute; z-index: 40; cursor: grab; padding: 4px; border: 1px dashed transparent; border-radius: 4px; transform-origin: top left; }
        .floating-element.selected { border: 2px dashed #3498db !important; background: rgba(255,255,255,0.9); }
        .floating-text { color: #000; font-family: sans-serif; white-space: pre-wrap; background: transparent; padding: 2px 4px; }
        .btn-delete-float { position: absolute; top: -10px; right: -10px; background: #e74c3c; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 10px; cursor: pointer; display: none; z-index: 50; }
        .btn-bg-float { position: absolute; top: -10px; left: -10px; background: #fff; color: #000; border: 1px solid #ccc; border-radius: 50%; width: 22px; height: 22px; font-size: 10px; cursor: pointer; display: none; z-index: 50; }
        .resize-handle { position: absolute; bottom: -8px; right: -8px; width: 16px; height: 16px; background: #3498db; border-radius: 50%; cursor: nwse-resize; display: none; z-index: 50; border: 2px solid white; }

        .floating-element:hover .btn-delete-float,
        .floating-element:hover .btn-bg-float,
        .floating-element:hover .resize-handle,
        .floating-element.selected .btn-delete-float,
        .floating-element.selected .btn-bg-float,
        .floating-element.selected .resize-handle { display: flex !important; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #222; padding: 20px; border-radius: 10px; width: 90%; max-width: 400px; }

    function crearElementoFlotante(parent, x, y, pageNum, tipo, contenido) {
        const wrapper = document.createElement('div');
        wrapper.className = 'floating-element';
        const scale = window.pdfGlobalScale || 1;
        wrapper.style.left = `${x}px`;
        wrapper.style.top = `${y}px`;
        wrapper.style.transform = `scale(${scale})`;

        let el = tipo === 'text' ? document.createElement('span') : document.createElement('img');
        if (tipo === 'text') {
            el.innerText = contenido;
            el.style.fontSize = '14px';
        } else {
            el.src = contenido;
            el.style.width = '120px';
        }
        wrapper.appendChild(el);

        const del = document.createElement('div');
        del.innerHTML = '×'; del.className = 'btn-delete-float';
        del.onclick = () => wrapper.remove();
        wrapper.appendChild(del);

        parent.appendChild(wrapper);
    }
