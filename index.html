<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuFácil - Generador de Documentos IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/downloadjs@1.4.7/download.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .screen { display: none; flex-direction: column; width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        #screen-home { display: flex; }
        .btn-main { background: #f1c40f; color: #000; border: none; padding: 15px 25px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 15px; width: 100%; }
        .btn-main:hover { opacity: 0.9; }
        .btn-volver { background: #444; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; }
        .input-ia-paso { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; outline: none; font-size: 16px; margin-top: 10px; }
        /* Estilos para el chat */
        #chat-container { height: 70vh; }
        .msg-ia { background: #333; color: #fff; padding: 10px 15px; border-radius: 15px 15px 15px 0; align-self: flex-start; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .msg-user { background: #f1c40f; color: #000; padding: 10px 15px; border-radius: 15px 15px 0 15px; align-self: flex-end; max-width: 85%; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <!-- PANTALLA DE INICIO -->
    <div id="screen-home" class="screen">
        <h1 style="color: #f1c40f; text-align: center; width: 100%;">DocuFácil</h1>
        <p style="text-align: center; margin-bottom: 30px;">Selecciona una opción para empezar:</p>
        <button class="btn-main" onclick="iniciarChatIA( )">Generación de Documentos IA</button>
        <button class="btn-main" onclick="iniciarRellenadoPDF()">Rellenado de PDF</button>
    </div>

    <!-- PANTALLA DE CHAT IA -->
    <div id="screen-chat-ia" class="screen">
        <button class="btn-volver" onclick="volverAHome()">← Volver al Inicio</button>
        
        <div id="chat-container" style="flex: 1; display: flex; flex-direction: column; background: #1a1a1a; border-radius: 15px; border: 1px solid #333; overflow: hidden;">
            <!-- Cabecera del Chat -->
            <div style="background: #2c3e50; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #444;">
                <div style="width: 40px; height: 40px; background: #f1c40f; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px;">🤖</div>
                <div>
                    <p style="font-weight: bold; font-size: 14px;" id="chat-titulo-ia">Asistente DocuFácil</p>
                    <p style="font-size: 11px; color: #2ecc71;">● En línea</p>
                </div>
            </div>

            <!-- Mensajes -->
            <div id="chat-mensajes" style="flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;">
                <!-- Los mensajes aparecerán aquí -->
            </div>

            <!-- Área de Entrada -->
            <div style="padding: 15px; background: #222; border-top: 1px solid #333; display: flex; gap: 10px; align-items: center;">
                <textarea id="chat-input-ia" placeholder="Escribe aquí tu respuesta..." style="flex: 1; background: #000; color: #fff; border: 1px solid #444; border-radius: 20px; padding: 10px 15px; outline: none; resize: none; font-size: 14px;" rows="1"></textarea>
                <button onclick="enviarMensajeChat()" style="background: #f1c40f; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px;">🚀</button>
            </div>
        </div>

        <!-- Botón de Acción Final (Aparece cuando el documento está listo) -->
        <button id="btn-finalizar-chat" style="display: none; background: #2ecc71; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer;" onclick="prepararEstampadoDesdeChat()">
            ✨ Todo listo, generar PDF 🪙
        </button>
    </div>

    <!-- MODAL DE PRE-VISUALIZACIÓN IA -->
    <div id="modal-preview-ia" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; justify-content: center; align-items: center; padding: 20px;">
        <div style="background: #222; padding: 25px; border-radius: 15px; border: 1px solid #555; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;">
            <h3 style="color: #f1c40f;">Revisa tu Documento</h3>
            <div id="preview-campos-ia" style="display: flex; flex-direction: column; gap: 10px;">
                <!-- Aquí se cargarán los textos para editar -->
            </div>
            
            <div style="background: #333; padding: 15px; border-radius: 10px; border: 1px solid #444;">
                <label style="display: flex; align-items: center; gap: 10px; color: white; cursor: pointer;">
                    <input type="checkbox" id="check-incluir-firma" checked style="width: 20px; height: 20px;">
                    ¿Incluir mi firma en el documento?
                </label>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn-ia-cancel" onclick="cerrarPreviewIA()">Atrás</button>
                <button class="btn-ia-nav" onclick="confirmarDescargaIA()">Confirmar y Descargar 🪙</button>
            </div>
        </div>
    </div>

    <!-- MODAL IA PASO A PASO (Antiguo, lo mantengo oculto por si acaso) -->
    <div id="modal-ia" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; padding: 20px;">
        <div id="contenedor-ia" style="background: #222; padding: 25px; border-radius: 15px; border: 1px solid #555; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <!-- Aquí se cargarán las preguntas -->
        </div>
    </div>

    <!-- PANTALLA DE RELLENADO DE PDF (Mantengo tu estructura original) -->
    <div id="screen-rellenado-pdf" class="screen">
        <button class="btn-volver" onclick="volverAHome()">← Volver al Inicio</button>
        <h2 style="color: #f1c40f; text-align: center; width: 100%;">Rellenado de PDF</h2>
        <p style="text-align: center; margin-bottom: 20px;">Aquí va tu interfaz de rellenado de PDF existente.</p>
        <!-- AQUI VA EL HTML DE TU INTERFAZ DE RELLENADO DE PDF -->
    </div>

    <script>
        // Inicialización de Supabase (Reemplaza con tus claves)
        const supabaseUrl = 'TU_SUPABASE_URL';
        const supabaseAnonKey = 'TU_SUPABASE_ANON_KEY';
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        // Variable global para las plantillas (DEBES CARGAR ESTO DESDE TU BASE DE DATOS)
        // Ejemplo: 
        const plantillasDisponibles = [
            { nombre: 'Carta Simple', tipo: 'inteligente', configuracion: { 
                fondo: 'data:application/pdf;base64,...', // Base64 de tu PDF de fondo
                tipoFondo: 'pdf', 
                areas: [
                    { nombre: 'Fecha', tipo: 'texto', x: 100, y: 100, w: 200, h: 20 },
                    { nombre: 'Destinatario', tipo: 'texto', x: 100, y: 150, w: 300, h: 20 },
                    { nombre: 'Cuerpo', tipo: 'texto', x: 100, y: 200, w: 400, h: 150 },
                    { nombre: 'Firma', tipo: 'firma', x: 150, y: 600, w: 150, h: 80 }
                ]
            }},
            { nombre: 'Contrato de Alquiler', tipo: 'inteligente', configuracion: { /* ... */ } },
            // ... más plantillas
        ];

        // Función auxiliar para descargar archivos
        function download(bytes, filename, mimeType) {
            const blob = new Blob([bytes], { type: mimeType });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Función para iniciar el rellenado de PDF (tu función original)
        function iniciarRellenadoPDF() {
            document.getElementById("screen-home").style.display = "none";
            document.getElementById("screen-rellenado-pdf").style.display = "flex";
            // AQUI VA LA LOGICA DE INICIO DE TU RELLENADO DE PDF
        }

        // AQUI VA EL RESTO DE TU JAVASCRIPT ORIGINAL PARA RELLENADO DE PDF
        // (Funciones como clickPlantilla, abrirFormulario, etc. si las usas para el rellenado)

        // ==========================================
        // LÓGICA DE FIRMA (COMPARTIDA)
        // ==========================================
        let drawingIA = false;
        let sigCtxIA;

        function iniciarCanvasFirmaIA() {
            const canvas = document.getElementById("canvas-firma-ia");
            if (!canvas) return; // Asegurarse de que el canvas existe

            // Ajustar tamaño del canvas para alta resolución y evitar pixelado
            const dpi = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * dpi;
            canvas.height = canvas.offsetHeight * dpi;
            canvas.style.width = (canvas.offsetWidth) + "px";
            canvas.style.height = (canvas.offsetHeight) + "px";

            sigCtxIA = canvas.getContext("2d");
            sigCtxIA.scale(dpi, dpi);
            sigCtxIA.lineWidth = 2;
            sigCtxIA.strokeStyle = "#000";
            sigCtxIA.lineCap = "round";

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => { e.preventDefault(); drawingIA = true; const pos = getPos(e); sigCtxIA.beginPath(); sigCtxIA.moveTo(pos.x, pos.y); };
            const move = (e) => { e.preventDefault(); if(!drawingIA) return; const pos = getPos(e); sigCtxIA.lineTo(pos.x, pos.y); sigCtxIA.stroke(); };
            const stop = () => { drawingIA = false; };

            canvas.addEventListener("mousedown", start);
            canvas.addEventListener("mousemove", move);
            window.addEventListener("mouseup", stop);
            canvas.addEventListener("touchstart", start, {passive:false});
            canvas.addEventListener("touchmove", move, {passive:false});
            canvas.addEventListener("touchend", stop);
        }

        function limpiarFirmaIA() {
            const canvas = document.getElementById("canvas-firma-ia");
            if(canvas) canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
        }

        // ==========================================
        // LÓGICA DE RELLENADO DE PDF (TU CÓDIGO ORIGINAL)
        // ==========================================

        // AQUI VA TODO EL JAVASCRIPT ORIGINAL DE TU INTERFAZ DE RELLENADO DE PDF
        // Por ejemplo, funciones como:
        // - clickPlantilla (si la usas para el rellenado)
        // - abrirFormulario (si la usas para el rellenado)
        // - Lógica para cargar y mostrar el PDF
        // - Lógica para arrastrar y soltar elementos
        // - Lógica para guardar el PDF rellenado
        // Mantén todo tu código JavaScript aquí para el rellenado de PDF.

        // Ejemplo de cómo podría ser tu función clickPlantilla original (si aplica)
        /*
        function clickPlantilla(tpl) {
            if (!usuarioActual || usuarioActual.creditos <= 0) {
                alert("🔒 Necesitas activar un código con créditos.");
                document.getElementById("seccion-compra").scrollIntoView({ behavior: "smooth" });
                return;
            }
            // Lógica para abrir el formulario de rellenado de PDF
            abrirFormulario(tpl);
        }
        */

        // ==========================================
        // FIN DE LA LÓGICA DE RELLENADO DE PDF
        // ==========================================

        // ==========================================
        // LÓGICA DEL CHAT IA (CEREBRO)
        // ==========================================
        let chatHistory = [];
        let currentDocumentDraft = {}; // Borrador del documento que la IA va generando
        let currentTemplate = null; // Plantilla seleccionada por la IA o el usuario
        let waitingForUserResponse = false;

        // Función para iniciar el chat
        function iniciarChatIA() {
            document.getElementById("screen-home").style.display = "none";
            document.getElementById("screen-chat-ia").style.display = "flex";
            document.getElementById("chat-mensajes").innerHTML = ""; // Limpiar mensajes anteriores
            chatHistory = [];
            currentDocumentDraft = {};
            currentTemplate = null;
            waitingForUserResponse = false;
            document.getElementById("btn-finalizar-chat").style.display = "none";
            
            // Mensaje de bienvenida de la IA
            enviarMensajeIA("¡Hola! Soy tu Asistente de Documentos IA. ¿Qué tipo de documento necesitas hoy? (Ej: 'Una carta de renuncia', 'Un contrato de alquiler', 'Una solicitud')");
        }

        // Función para mostrar mensajes de la IA en el chat
        function enviarMensajeIA(texto) {
            const chatMensajes = document.getElementById("chat-mensajes");
            const msgDiv = document.createElement("div");
            msgDiv.className = "msg-ia";
            msgDiv.innerHTML = texto;
            chatMensajes.appendChild(msgDiv);
            chatMensajes.scrollTop = chatMensajes.scrollHeight;
            chatHistory.push({ role: "assistant", content: texto });
            waitingForUserResponse = true;
        }

        // Función para mostrar mensajes del usuario en el chat
        function enviarMensajeUsuario(texto) {
            const chatMensajes = document.getElementById("chat-mensajes");
            const msgDiv = document.createElement("div");
            msgDiv.className = "msg-user";
            msgDiv.innerHTML = texto;
            chatMensajes.appendChild(msgDiv);
            chatMensajes.scrollTop = chatMensajes.scrollHeight;
            chatHistory.push({ role: "user", content: texto });
            waitingForUserResponse = false;
        }

        // Función principal para enviar la conversación a la IA de Supabase
        async function enviarMensajeChat() {
            const chatInput = document.getElementById("chat-input-ia");
            const userMessage = chatInput.value.trim();
            if (!userMessage) return;

            enviarMensajeUsuario(userMessage);
            chatInput.value = "";
            chatInput.disabled = true;

            try {
                // Construir el historial para enviar a la IA
                const messagesForAI = chatHistory.map(msg => ({ role: msg.role, content: msg.content }));
                
                // Añadir un mensaje de sistema para guiar a la IA
                messagesForAI.unshift({ 
                    role: "system", 
                    content: `Eres un asistente de documentos IA. Tu objetivo es ayudar al usuario a redactar documentos formales. Tienes acceso a las siguientes plantillas: ${plantillasDisponibles.map(p => p.nombre).join(', ')}. 
                    
                    Si el usuario pide un documento, primero confirma el nombre exacto de la plantilla. Luego, pide la información necesaria para rellenar sus campos. Si el usuario pide cambios, actualiza el borrador. 
                    
                    Cuando el documento esté listo, debes responder con un JSON que contenga el borrador final del documento, con las claves siendo los nombres de los campos de la plantilla. Por ejemplo: { "Fecha": "2023-10-26", "Destinatario": "Juan Pérez", "Cuerpo": "Estimado Juan..." }. 
                    
                    Si el usuario quiere editar, responde con el JSON actualizado. Si el usuario quiere firmar, pregunta si desea añadir su firma. Siempre mantén un tono profesional y conversacional.`
                });

                const URL_FUNCION = 'https://wpzddhmllctdsiuxenss.supabase.co/functions/v1/generar-documento'; 
                
                const response = await fetch(URL_FUNCION, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${supabase.supabaseKey}` 
                    },
                    body: JSON.stringify({ prompt: messagesForAI } )
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || `Error ${response.status}: No se pudo conectar con la IA.`);
                }

                const data = await response.json();
                
                let aiResponseContent = data.resultado;

                // Intentar parsear si la IA devuelve un JSON
                try {
                    const parsedResponse = JSON.parse(aiResponseContent);
                    // Si es un JSON, es un borrador de documento
                    currentDocumentDraft = parsedResponse;
                    // Intentar identificar la plantilla basada en los campos devueltos o el contexto
                    if (!currentTemplate) {
                        // Lógica para inferir la plantilla si no está seleccionada
                        // Por ahora, asumimos que la IA nos dirá qué plantilla es o la inferimos del prompt inicial
                        // O simplemente usamos la primera plantilla disponible como placeholder
                        currentTemplate = plantillasDisponibles[0]; // Esto DEBE ser mejorado para seleccionar la plantilla correcta
                    }
                    enviarMensajeIA("¡He preparado un borrador! ¿Qué te parece? Puedes pedirme cambios o decirme si está listo.");
                    mostrarPrevisualizacionChat(); // Mostrar la previsualización
                    document.getElementById("btn-finalizar-chat").style.display = "block";
                } catch (e) {
                    // Si no es JSON, es un mensaje conversacional de la IA
                    enviarMensajeIA(aiResponseContent);
                    document.getElementById("btn-finalizar-chat").style.display = "none";
                }

            } catch (err) {
                console.error("Error en el chat IA:", err);
                enviarMensajeIA(`❌ Lo siento, hubo un error: ${err.message}. Por favor, inténtalo de nuevo.`);
                document.getElementById("btn-finalizar-chat").style.display = "none";
            } finally {
                chatInput.disabled = false;
                chatInput.focus();
            }
        }

        // Función para mostrar la previsualización del documento en el chat
        function mostrarPrevisualizacionChat() {
            const previewDiv = document.getElementById("chat-mensajes"); // Usamos el mismo div de mensajes para la previsualización
            const existingPreview = document.getElementById("document-preview-chat");
            if (existingPreview) existingPreview.remove();

            const previewContainer = document.createElement("div");
            previewContainer.id = "document-preview-chat";
            previewContainer.className = "msg-ia"; // Estilo de mensaje de IA
            previewContainer.style.backgroundColor = "#1e3a8a"; // Un color diferente para destacar
            previewContainer.style.marginTop = "15px";
            previewContainer.style.marginBottom = "15px";
            previewContainer.style.border = "1px solid #3b82f6";

            let previewHTML = 
                `<h4 style="color:white; margin-bottom:10px;">📄 Borrador Actual:</h4>`;
            for (const field in currentDocumentDraft) {
                previewHTML += 
                    `<p style="color:#e0e7ff; margin-bottom:5px;"><strong>${field}:</strong> ${currentDocumentDraft[field]}</p>`;
            }
            previewContainer.innerHTML = previewHTML;
            previewDiv.appendChild(previewContainer);
            previewDiv.scrollTop = previewDiv.scrollHeight;
        }

        // Función para volver a la pantalla de inicio
        function volverAHome() {
            document.getElementById("screen-chat-ia").style.display = "none";
            document.getElementById("screen-rellenado-pdf").style.display = "none"; // Asegurarse de ocultar también el rellenado
            document.getElementById("screen-home").style.display = "flex";
        }

        // Función para preparar el estampado final (llamada desde el botón "Generar PDF" del chat)
        async function prepararEstampadoDesdeChat() {
            // Si no hay un borrador, no hacemos nada
            if (Object.keys(currentDocumentDraft).length === 0) {
                enviarMensajeIA("No hay un borrador de documento para generar. Por favor, dime qué documento quieres crear.");
                return;
            }

            // Mostrar el modal de previsualización
            document.getElementById("modal-preview-ia").style.display = "flex";
            document.getElementById("screen-chat-ia").style.display = "none"; // Ocultar el chat mientras se previsualiza

            const previewCamposDiv = document.getElementById("preview-campos-ia");
            previewCamposDiv.innerHTML = ""; // Limpiar contenido anterior

            // Mostrar los campos del borrador para edición
            for (const fieldName in currentDocumentDraft) {
                const fieldContent = currentDocumentDraft[fieldName];
                const fieldDiv = document.createElement("div");
                fieldDiv.innerHTML = `
                    <label style="color: #f1c40f; font-weight: bold;">${fieldName}:</label>
                    <textarea id="preview-field-${fieldName}" class="input-ia-paso" rows="3" style="height: auto;">${fieldContent}</textarea>
                `;
                previewCamposDiv.appendChild(fieldDiv);
            }

            // Asegurarse de que el checkbox de firma esté visible si hay una firma en respuestasIA
            const checkIncluirFirma = document.getElementById("check-incluir-firma");
            if (respuestasIA["Firma"]) {
                checkIncluirFirma.parentElement.style.display = "flex";
                checkIncluirFirma.checked = true; // Por defecto, incluir firma si existe
            } else {
                checkIncluirFirma.parentElement.style.display = "none"; // Ocultar si no hay firma
                checkIncluirFirma.checked = false;
            }
        }

        // Función para cerrar el modal de previsualización y volver al chat
        function cerrarPreviewIA() {
            document.getElementById("modal-preview-ia").style.display = "none";
            document.getElementById("screen-chat-ia").style.display = "flex"; // Volver al chat
        }

        // Función para confirmar la descarga y estampar el PDF
        async function confirmarDescargaIA() {
            document.getElementById("modal-preview-ia").style.display = "none";
            // document.getElementById("screen-chat-ia").style.display = "none"; // No ocultar el chat, solo el modal

            // Recopilar los textos editados en la previsualización
            const finalDocumentData = {};
            for (const fieldName in currentDocumentDraft) {
                const textarea = document.getElementById(`preview-field-${fieldName}`);
                if (textarea) {
                    finalDocumentData[fieldName] = textarea.value;
                }
            }

            const incluirFirma = document.getElementById("check-incluir-firma").checked;
            const firmaData = incluirFirma ? respuestasIA["Firma"] : null;

            // Llamar a la función de estampado con los datos finales
            await estamparDocumentoIA(finalDocumentData, firmaData);
        }

        // ==========================================
        // ESTAMPADO DE DOCUMENTO IA (ACTUALIZADO PARA CHAT Y FIRMA OPCIONAL)
        // ==========================================
        async function estamparDocumentoIA(finalDocumentData, firmaData = null) {
            // currentTemplate DEBE estar definido aquí. Si no lo está, la IA no ha identificado la plantilla.
            if (!currentTemplate) {
                alert("Error: La IA no ha identificado la plantilla para estampar. Por favor, especifica el tipo de documento en el chat.");
                return;
            }

            const { fondo, tipoFondo, areas } = currentTemplate.configuracion; 
            const MARGEN_PUNTOS = 28; // Aproximadamente 1cm en puntos de PDF (1 pulgada = 72 puntos)

            try {
                let pdfDoc;
                // 1. Cargar el fondo
                if (tipoFondo === 'pdf') {
                    const pdfBytes = Uint8Array.from(atob(fondo.split(',')[1]), c => c.charCodeAt(0));
                    pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);
                } else {
                    pdfDoc = await PDFLib.PDFDocument.create();
                    const page = pdfDoc.addPage([595, 842]); // A4 estándar
                    const imgBytes = Uint8Array.from(atob(fondo.split(',')[1]), c => c.charCodeAt(0));
                    const embedImg = fondo.includes('png') ? await pdfDoc.embedPng(imgBytes) : await pdfDoc.embedJpg(imgBytes);
                    page.drawImage(embedImg, { x: 0, y: 0, width: 595, height: 842 });
                }

                const pages = pdfDoc.getPages();
                const firstPage = pages[0];
                const { width, height } = firstPage.getSize();

                // Calcular escalas para ajustar de 800px a tamaño real del PDF
                const scaleX = (width - 2 * MARGEN_PUNTOS) / 800; 
                const scaleY = (height - 2 * MARGEN_PUNTOS) / 800; 

                // Cargar fuente (si es necesario, puedes usar una fuente por defecto)
                const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);

                // 2. Estampar los textos generados por la IA
                for (const area of areas) {
                    const textoParaEstampar = finalDocumentData[area.nombre];
                    if (textoParaEstampar && area.tipo === 'texto') {
                        const pdfX = MARGEN_PUNTOS + (area.x * scaleX);
                        let pdfY = height - MARGEN_PUNTOS - (area.y * scaleY) - (area.h * scaleY); // Ajuste para el origen superior

                        firstPage.drawText(textoParaEstampar, {
                            x: pdfX, y: pdfY,
                            size: 10, font: font,
                            color: PDFLib.rgb(0, 0, 0),
                            maxWidth: area.w * scaleX,
                            lineHeight: 12
                        });
                    }
                }

                // 3. Estampar la firma si se solicitó y existe
                if (firmaData) {
                    const firmaArea = areas.find(a => a.tipo === 'firma');
                    if (firmaArea) {
                        const firmaImgBytes = Uint8Array.from(atob(firmaData.split(',')[1]), c => c.charCodeAt(0));
                        const firmaImg = await pdfDoc.embedPng(firmaImgBytes);

                        const pdfX = MARGEN_PUNTOS + (firmaArea.x * scaleX);
                        const pdfY = height - MARGEN_PUNTOS - (firmaArea.y * scaleY) - (firmaArea.h * scaleY);

                        firstPage.drawImage(firmaImg, {
                            x: pdfX, y: pdfY,
                            width: firmaArea.w * scaleX,
                            height: firmaArea.h * scaleY,
                        });
                    }
                }

                // 4. Descargar y Cobrar
                const finalPdfBytes = await pdfDoc.save();
                download(finalPdfBytes, `${currentTemplate.nombre}_IA.pdf`, "application/pdf");
                
                // Descontar 1 crédito (Lógica original)
                await supabase.from('usuarios_codigos')
                    .update({ creditos: usuarioActual.creditos - 1 })
                    .eq('id', usuarioActual.id);
                
                alert("✅ ¡Documento generado con IA con éxito!");
                location.reload();

            } catch (err) {
                console.error("Error Estampado:", err);
                alert("❌ Error al crear el PDF final: " + err.message);
            }
        }

    </script>
</body>
</html>
